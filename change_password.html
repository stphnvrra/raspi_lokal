<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - LoKal Learning Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Auth Page Styles */
        .auth-container {
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0f0f1a 100%);
        }

        .auth-card {
            width: 100%;
            max-width: 360px;
            background-color: var(--bg-secondary);
            border-radius: var(--border-radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--bg-tertiary);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .auth-logo {
            width: 100px;
            height: auto;
            margin-bottom: 16px;
        }

        .auth-title {
            font-size: var(--font-size-2xl);
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            color: var(--text-secondary);
            font-size: var(--font-size-base);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            background-color: var(--bg-tertiary);
            border: 2px solid var(--bg-tertiary);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            font-size: var(--font-size-lg);
            font-family: inherit;
            transition: all var(--transition-fast);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .auth-btn {
            width: 100%;
            padding: 18px 24px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: var(--font-size-lg);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            margin-top: 8px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-btn.secondary {
            background: transparent;
            border: 2px solid var(--bg-tertiary);
            color: var(--text-secondary);
            margin-top: 0;
        }

        .auth-btn.secondary:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            box-shadow: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--bg-tertiary);
        }

        .auth-footer p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .auth-link {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color var(--transition-fast);
        }

        .auth-link:hover {
            color: var(--accent-secondary);
            text-decoration: underline;
        }

        .error-message {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 14px 18px;
            border-radius: var(--border-radius);
            font-size: 15px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.4s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-8px);
            }

            75% {
                transform: translateX(8px);
            }
        }

        .success-message {
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 14px 18px;
            border-radius: var(--border-radius);
            font-size: 15px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .password-requirements {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 4px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 24px;
            transition: color var(--transition-fast);
        }

        .back-btn:hover {
            color: var(--text-primary);
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <a href="index.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Chat
            </a>

            <div class="auth-header">
                <img src="logo.png" alt="LoKal Logo" class="auth-logo">
                <h1 class="auth-title">Change Password</h1>
                <p class="auth-subtitle">Keep your account secure</p>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form class="auth-form" id="changePasswordForm">
                <div class="form-group">
                    <label class="form-label" for="oldPassword">Old Password</label>
                    <input type="password" id="oldPassword" name="old_password" class="form-input"
                        placeholder="Enter your current password" autocomplete="current-password" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="new_password" class="form-input"
                        placeholder="Enter your new password" autocomplete="new-password" required>
                    <span class="password-requirements">Must be at least 8 characters</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirm_password" class="form-input"
                        placeholder="Confirm your new password" autocomplete="new-password" required>
                </div>

                <button type="submit" class="auth-btn" id="changePasswordBtn">
                    Change Password
                </button>

                <a href="index.html" class="auth-btn secondary">
                    Cancel
                </a>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';
        const form = document.getElementById('changePasswordForm');
        const changePasswordBtn = document.getElementById('changePasswordBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // Check if user is authenticated
        async function checkAuth() {
            try {
                const response = await fetch(`${API_BASE_URL}/auth/user/`, {
                    method: 'GET',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                if (!data.authenticated) {
                    // Redirect to login if not authenticated
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.log('Auth check failed');
                window.location.href = 'login.html';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validation
            if (!oldPassword || !newPassword || !confirmPassword) {
                showError('Please fill in all fields');
                return;
            }

            if (newPassword.length < 8) {
                showError('New password must be at least 8 characters long');
                return;
            }

            if (newPassword !== confirmPassword) {
                showError('New passwords do not match');
                return;
            }

            if (oldPassword === newPassword) {
                showError('New password must be different from the old password');
                return;
            }

            changePasswordBtn.disabled = true;
            changePasswordBtn.textContent = 'Changing password...';
            hideMessages();

            try {
                const response = await fetch(`${API_BASE_URL}/auth/change-password/`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({
                        old_password: oldPassword,
                        new_password: newPassword,
                        confirm_password: confirmPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    successMessage.textContent = '✓ Password changed successfully! Redirecting...';
                    successMessage.classList.add('show');
                    form.reset();
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    showError(data.error || 'Failed to change password. Please try again.');
                    changePasswordBtn.disabled = false;
                    changePasswordBtn.textContent = 'Change Password';
                }
            } catch (error) {
                console.error('Change password error:', error);
                showError('Connection error. Make sure the server is running.');
                changePasswordBtn.disabled = false;
                changePasswordBtn.textContent = 'Change Password';
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        function hideMessages() {
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
        }

        // Check auth on load
        checkAuth();

        // Focus on old password input
        document.getElementById('oldPassword').focus();
    </script>
</body>

</html>
