{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LoKal Learning Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        /* Auth Page Styles */
        .auth-container {
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0f0f1a 100%);
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background-color: var(--bg-secondary);
            border-radius: var(--border-radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--bg-tertiary);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo {
            width: 120px;
            height: auto;
            margin-bottom: 16px;
        }

        .auth-title {
            font-size: var(--font-size-2xl);
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            color: var(--text-secondary);
            font-size: var(--font-size-base);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            background-color: var(--bg-tertiary);
            border: 2px solid var(--bg-tertiary);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            font-size: var(--font-size-lg);
            font-family: inherit;
            transition: all var(--transition-fast);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .auth-btn {
            width: 100%;
            padding: 18px 24px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: var(--font-size-lg);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            margin-top: 8px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--bg-tertiary);
        }

        .auth-footer p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .auth-link {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color var(--transition-fast);
        }

        .auth-link:hover {
            color: var(--accent-secondary);
            text-decoration: underline;
        }

        .error-message {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 14px 18px;
            border-radius: var(--border-radius);
            font-size: 15px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.4s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-8px);
            }

            75% {
                transform: translateX(8px);
            }
        }

        .success-message {
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 14px 18px;
            border-radius: var(--border-radius);
            font-size: 15px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        /* 7-inch Raspberry Pi Display (800x480) and smaller heights */
        @media (max-height: 500px) {
            .auth-container {
                padding: 10px;
                align-items: flex-start;
                overflow-y: auto;
            }

            .auth-card {
                padding: 16px;
                margin: 5px auto;
                max-width: 360px;
            }

            .auth-header {
                margin-bottom: 12px;
            }

            .auth-logo {
                width: 60px;
                margin-bottom: 4px;
            }

            .auth-title {
                font-size: 20px;
                margin-bottom: 2px;
            }

            .auth-subtitle {
                font-size: 13px;
            }

            .auth-form {
                gap: 10px;
            }

            .form-input {
                padding: 8px 12px;
                font-size: 15px;
            }

            .auth-btn {
                padding: 12px 16px;
                font-size: 15px;
            }

            .auth-footer {
                margin-top: 16px;
                padding-top: 16px;
            }
        }

        /* Mobile Devices */
        @media (max-width: 480px) {
            .auth-card {
                width: 92%;
                padding: 20px 16px;
            }

            .auth-title {
                font-size: 22px;
            }

            .auth-subtitle {
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="{% static 'img/logo.png' %}" alt="LoKal Logo" class="auth-logo">
                <h1 class="auth-title">Welcome Back!</h1>
                <p class="auth-subtitle">Sign in to continue learning</p>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input"
                        placeholder="Enter your username" autocomplete="username" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input"
                        placeholder="Enter your password" autocomplete="current-password" required>
                </div>

                <button type="submit" class="auth-btn" id="loginBtn">
                    Sign In
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html" class="auth-link">Create one</a></p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // Check if already logged in
        async function checkAuth() {
            try {
                const response = await fetch(`${API_BASE_URL}/auth/user/`, {
                    method: 'GET',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                if (data.authenticated) {
                    window.location.href = 'index.html';
                }
            } catch (error) {
                console.log('Not logged in');
            }
        }

        // Check URL for registration success message
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('registered') === 'true') {
            successMessage.textContent = '🎉 Account created successfully! Please sign in.';
            successMessage.classList.add('show');
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('Please fill in all fields');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
            hideMessages();

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login/`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    successMessage.textContent = '✓ Login successful! Redirecting...';
                    successMessage.classList.add('show');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showError(data.error || 'Login failed. Please try again.');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign In';
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Connection error. Make sure the server is running.');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        function hideMessages() {
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
        }

        // Focus on username input
        document.getElementById('username').focus();

        // Check auth on load
        checkAuth();
    </script>
</body>

</html>
