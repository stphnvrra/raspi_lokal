{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - LoKal Learning Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        /* Auth Page Styles */
        .auth-container {
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0f0f1a 100%);
        }

        .auth-card {
            width: 100%;
            max-width: 380px;
            background-color: var(--bg-secondary);
            border-radius: var(--border-radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--bg-tertiary);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .auth-logo {
            width: 80px;
            height: auto;
            margin-bottom: 12px;
        }

        .auth-title {
            font-size: var(--font-size-2xl);
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            color: var(--text-secondary);
            font-size: var(--font-size-base);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--bg-tertiary);
            border: 2px solid var(--bg-tertiary);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            font-size: var(--font-size-lg);
            font-family: inherit;
            transition: all var(--transition-fast);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input.error {
            border-color: var(--error);
        }

        .form-hint {
            font-size: 13px;
            color: var(--text-muted);
        }

        .password-strength {
            height: 4px;
            background-color: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all var(--transition-fast);
            border-radius: 2px;
        }

        .password-strength-bar.weak {
            width: 33%;
            background-color: var(--error);
        }

        .password-strength-bar.medium {
            width: 66%;
            background-color: var(--warning);
        }

        .password-strength-bar.strong {
            width: 100%;
            background-color: var(--success);
        }

        .auth-btn {
            width: 100%;
            padding: 18px 24px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: var(--font-size-lg);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            margin-top: 8px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--bg-tertiary);
        }

        .auth-footer p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .auth-link {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color var(--transition-fast);
        }

        .auth-link:hover {
            color: var(--accent-secondary);
            text-decoration: underline;
        }

        .error-message {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 14px 18px;
            border-radius: var(--border-radius);
            font-size: 15px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.4s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-8px);
            }

            75% {
                transform: translateX(8px);
            }
        }

        /* 7-inch Raspberry Pi Display (800x480) and smaller heights */
        @media (max-height: 550px) {
            .auth-container {
                padding: 10px;
                align-items: flex-start;
                overflow-y: auto;
            }

            .auth-card {
                padding: 12px 16px;
                margin: 5px auto;
                max-width: 360px;
            }

            .auth-header {
                margin-bottom: 8px;
            }

            .auth-logo {
                width: 50px;
                margin-bottom: 4px;
            }

            .auth-title {
                font-size: 20px;
                margin-bottom: 2px;
            }

            .auth-subtitle {
                font-size: 13px;
            }

            .auth-form {
                gap: 6px;
            }

            .form-group {
                gap: 2px;
            }

            .form-label {
                font-size: 11px;
            }

            .form-input {
                padding: 6px 10px;
                font-size: 14px;
            }

            .form-hint {
                font-size: 10px;
            }

            .auth-btn {
                padding: 10px 16px;
                font-size: 15px;
                margin-top: 2px;
            }

            .auth-footer {
                margin-top: 10px;
                padding-top: 10px;
            }
        }

        /* Mobile Devices */
        @media (max-width: 480px) {
            .auth-card {
                width: 92%;
                padding: 20px 16px;
            }

            .auth-title {
                font-size: 22px;
            }

            .auth-subtitle {
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="{% static 'img/logo.png' %}" alt="LoKal Logo" class="auth-logo">
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Start your learning journey today</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <form class="auth-form" id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Choose a username"
                        autocomplete="username" required>
                    <span class="form-hint">Letters, numbers, and underscores only</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input"
                        placeholder="Create a password" autocomplete="new-password" required>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="passwordStrength"></div>
                    </div>
                    <span class="form-hint">At least 6 characters</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-input"
                        placeholder="Confirm your password" autocomplete="new-password" required>
                </div>

                <button type="submit" class="auth-btn" id="registerBtn">
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html" class="auth-link">Sign in</a></p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/api';
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const errorMessage = document.getElementById('errorMessage');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const passwordStrength = document.getElementById('passwordStrength');

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // Password strength indicator
        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            passwordStrength.className = 'password-strength-bar';

            if (password.length === 0) {
                passwordStrength.className = 'password-strength-bar';
            } else if (password.length < 6) {
                passwordStrength.classList.add('weak');
            } else if (password.length < 10 || !/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
                passwordStrength.classList.add('medium');
            } else {
                passwordStrength.classList.add('strong');
            }
        });

        // Check password match
        confirmPasswordInput.addEventListener('input', () => {
            if (confirmPasswordInput.value !== passwordInput.value) {
                confirmPasswordInput.classList.add('error');
            } else {
                confirmPasswordInput.classList.remove('error');
            }
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // Validation
            if (!username || !password) {
                showError('Please fill in all required fields');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match');
                confirmPasswordInput.classList.add('error');
                return;
            }

            // Validate username format
            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                showError('Username can only contain letters, numbers, and underscores');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = 'Creating account...';
            hideError();

            try {
                const response = await fetch(`${API_BASE_URL}/auth/register/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Redirect to login with success message
                    window.location.href = 'login.html?registered=true';
                } else {
                    showError(data.error || 'Registration failed. Please try again.');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Create Account';
                }
            } catch (error) {
                console.error('Registration error:', error);
                showError('Connection error. Make sure the server is running.');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create Account';
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        function hideError() {
            errorMessage.classList.remove('show');
        }

        // Focus on username input
        document.getElementById('username').focus();
    </script>
</body>

</html>
